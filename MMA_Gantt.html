<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Project Planner — 161.008 Sporting Grand Hotel Campione</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap">
<style>
*, *::before, *::after {
  box-sizing: border-box; margin: 0; padding: 0;
  -webkit-print-color-adjust: exact !important;
  print-color-adjust: exact !important;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden; /* we manage scroll ourselves */
}

body {
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  color: #363636;
  background: #fff;
  display: flex;
  flex-direction: column;
}

/* ── TOP BAR ── */
#topbar {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 18px 0 18px;
  gap: 10px;
}
.header-left h1 {
  font-size: 12px; font-weight: 400;
  text-transform: uppercase; letter-spacing: 0.1em;
}
.header-left .sub {
  font-size: 24px; font-weight: 200; text-transform: uppercase;
  letter-spacing: 0.1em; color: #888; margin-top: 2px;
}
.header-right-group {
  display: flex; align-items: center; gap: 18px;
}
.header-metas { display: flex; gap: 18px; }
.hm { display: flex; flex-direction: column; align-items: flex-end; gap: 1px; }
.hm .lbl { font-size: 14px;  letter-spacing: 0.07em; font-weight: 200; color: #aaa; }
.hm .val { font-size: 12px; }

/* ── TOOLBAR ── */
#toolbar {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 18px 6px 18px;
  border-bottom: 1.5px solid #363636;
}
.legend { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; flex: 1; }
.leg-ttl { font-size: 12px; text-transform: uppercase; letter-spacing: 0.07em; color: #aaa; }
.leg-i   { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #555; }
.leg-sw  { width: 32px; height: 12px; flex-shrink: 0; }
.leg-today-sw { width: 2px; height: 12px; background: #cc3322 !important; flex-shrink: 0; }

/* zoom controls */
.zoom-group {
  display: flex; align-items: center; gap: 6px;
  margin-left: auto; flex-shrink: 0;
}
.zoom-label {
  font-size: 12px; text-transform: uppercase;
  letter-spacing: 0.07em; color: #888; min-width: 38px; text-align: right;
}
.zoom-btn {
  background: #f4f4f4; border: 1px solid #ddd;
  color: #363636; font-size: 18px; font-weight: 300;
  width: 26px; height: 26px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; user-select: none;
  transition: background 0.1s;
}
.zoom-btn:hover { background: #e8e8e8; }
.zoom-btn:active { background: #ddd; }
.btn-reset {
  background: #363636; color: #fff; border: none;
  font-family: 'Inter', sans-serif; font-size: 10px;
  font-weight: 300; text-transform: uppercase; letter-spacing: 0.08em;
  padding: 5px 10px; cursor: pointer; height: 26px;
  flex-shrink: 0;
}
.btn-reset:hover { background: #222; }
.btn-print {
  background: #fff; color: #363636;
  border: 1px solid #ddd;
  font-family: 'Inter', sans-serif; font-size: 10px;
  font-weight: 300; text-transform: uppercase; letter-spacing: 0.08em;
  padding: 5px 10px; cursor: pointer; height: 26px;
  flex-shrink: 0;
}
.btn-print:hover { background: #f4f4f4; }

/* ── MAIN AREA (fills remaining height) ── */
#main {
  flex: 1;
  display: flex;
  overflow: hidden;
  min-height: 0;
}

/* ── LEFT FIXED PANEL ── */
#left-panel {
  flex-shrink: 0;
  width: 500px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  border-right: 1.5px solid #ccc;
}

#left-header {
  flex-shrink: 0;
  background: #f4f4f4;
  flex-direction: column;
  border-bottom: 1px solid #d0d0d0;
}
#left-header table {
  width: 100%; 
  border-collapse: collapse; 
  table-layout: fixed;
}
#left-header th {
  font-size: 10px; font-weight: 400;
  text-transform: uppercase; letter-spacing: 0.07em;
  color: #111; padding: 6px 6px;
  white-space: nowrap; overflow: hidden; text-align: left;
  border-right: 1px solid #e0e0e0;
}
#left-header th.r { text-align: left; }
#left-header th.c { text-align: left; }

#left-body {
  flex: 1;
  overflow-y: hidden; /* synced with right */
}
#left-body table {
  width: 100%; border-collapse: collapse; table-layout: fixed;
}

/* ── RIGHT SCROLLABLE PANEL ── */
#right-panel {
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  min-width: 0;
  cursor: grab;
  user-select: none;
}
#right-panel.grabbing { cursor: grabbing; }

#right-header {
  flex-shrink: 0;
  overflow: hidden;
  background: #f4f4f4;
  border-bottom: 1px solid #d0d0d0;
}
#month-canvas-wrap {
  /* width set by JS based on zoom */
  position: relative;
  height: 24px;
}
.month-cell {
  position: absolute;
  top: 0; bottom: 0;
  display: flex; align-items: center;
  padding-left: 4px;
  font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em;
  color: #111; overflow: hidden; white-space: nowrap;
  border-left: 1px solid #e0e0e0;
  background: #f4f4f4 !important;
}
.month-cell.year-start { border-left: 1.5px solid #bbb; }
.month-cell .yr { color: #333; margin-right: 3px; font-size: 8px; }

#right-scroll {
  flex: 1;
  overflow: hidden;
  min-height: 0;
}
#bars-canvas-wrap {
  position: relative;
  /* width set by JS; height = sum of rows */
}

/* ── ROW HEIGHTS ── */
.row-h-phase { height: 24px; }
.row-h-task  { height: 24px; }

/* ── LEFT TABLE ROWS ── */
.lrow {
  display: flex; align-items: center;
  border-bottom: 1px solid #eee;
  overflow: hidden;
}
.lrow.ph { background: #f0f0f0 !important; border-bottom: 1px solid #d0d0d0; }
.lrow.ph .ph-label {
  font-size: 10px; font-weight: 500;
  text-transform: uppercase; letter-spacing: 0.06em; color: #555;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  padding-left: 8px;
}
.l-color { flex-shrink: 0; width: 10px; height: 100%; }
.l-num   { flex-shrink: 0; width: 22px; font-size: 10px; color: #bbb; text-align: right; padding-right: 4px; }
.l-name  { flex: 1; font-size: 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding: 0 4px; }
.l-resp  { flex-shrink: 0; width: 50px; font-size: 10px; color: #888; text-align: center; }
.l-days  { flex-shrink: 0; width: 50px; font-size: 10px; color: #888; text-align: right; padding-right: 4px; }
.l-pct   { flex-shrink: 0; width: 50px; font-size: 10px; text-align: right; padding-right: 4px; }
.l-stat  { flex-shrink: 0; width: 100px; font-size: 10px; text-align: center; color: #888; }

/* ── CANVAS ROWS (right) ── */
.brow {
  position: absolute; left: 0; right: 0;
  border-bottom: 1px solid #eee;
  overflow: hidden;
}
.brow.ph { background: #f0f0f0 !important; border-bottom: 1px solid #d0d0d0; }

/* Grid lines */
.g-line {
  position: absolute; top: 0; bottom: 0;
  pointer-events: none; z-index: 1;
}
.g-month { width: 1px; background: #ebebeb !important; }
.g-year  { width: 1px; background: #d0d0d0 !important; }
.g-today { width: 2px; background: #cc3322 !important; z-index: 5; }

/* Gantt bar */
.bar-wrap {
  position: absolute; top: 50%; transform: translateY(-50%);
  height: 14px; z-index: 3; overflow: visible;
}
.bar-bg   { position: absolute; inset: 0; }
.bar-prog { position: absolute; top: 0; left: 0; height: 100%; z-index: 2; }
.bar-lbl  {
  position: absolute; left: calc(100% + 4px); top: 50%; transform: translateY(-50%);
  white-space: nowrap; font-size: 10px; color: #363636; z-index: 4;
  pointer-events: none;
}
.bar-lbl .bl-code { font-weight: 500; }
.bar-lbl .bl-pct  { margin-left: 2px; }
.bar-lbl .bl-resp { color: #999; margin-left: 3px; }

/* Phase summary bar */
.phase-bar {
  position: absolute; top: 50%; transform: translateY(-50%);
  height: 5px; opacity: 0.4; z-index: 2;
}

/* ── SCROLLBAR STYLING ── */
#right-scroll::-webkit-scrollbar { height: 6px; }
#right-scroll::-webkit-scrollbar-track { background: #f4f4f4; }
#right-scroll::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
#left-body::-webkit-scrollbar { display: none; }

/* ── PRINT ── */
@media print {
  @page { size: A3 landscape; margin: 7mm; }
  html, body { width: 420mm; height: auto; overflow: visible; }
  #topbar, #toolbar { padding: 4mm 5mm; }
  .zoom-group, .btn-print, .btn-reset { display: none !important; }
  #main { overflow: visible; height: auto; }
  #left-panel, #right-panel { overflow: visible; }
  #left-body, #right-scroll { overflow: visible; }
  #bars-canvas-wrap, #month-canvas-wrap { width: 100% !important; }
}
</style>
</head>

// ── COLORS ──────────────────────────────────────────────────────────────
const DISC_COLOR = {
  "Architecture":            "#4a7fb5",
  "Permits & Approvals":     "#e8a020",
  "Interior Design":         "#7ab04e",
  "Bill of Quantities":      "#9b6bb5",
  "Construction Management": "#e05c3a",
};
function color(disc) { return DISC_COLOR[disc] || "#888"; }
function lighten(hex, a) {
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `rgb(${Math.round(r+(255-r)*a)},${Math.round(g+(255-g)*a)},${Math.round(b+(255-b)*a)})`;
}

// ── TIME ────────────────────────────────────────────────────────────────
function pd(s) { return new Date(s+"T00:00:00"); }
const PRJ_START = pd("2026-05-01");
const PRJ_END   = pd("2028-09-30");
const TOTAL_MS  = PRJ_END - PRJ_START;
const TODAY     = new Date(); TODAY.setHours(0,0,0,0);

document.getElementById("gen-date").textContent =
  TODAY.toLocaleDateString("it-IT",{day:"2-digit",month:"short",year:"numeric"});

// position 0..1 in timeline
function frac(d) { return Math.max(0,Math.min(1,(d-PRJ_START)/TOTAL_MS)); }

// ── MONTHS ──────────────────────────────────────────────────────────────
const MO_IT = ["Gen","Feb","Mar","Apr","Mag","Giu","Lug","Ago","Set","Ott","Nov","Dic"];
const months = [];
{
  let c = new Date(PRJ_START.getFullYear(), PRJ_START.getMonth(), 1);
  while (c <= PRJ_END) {
    months.push({ y:c.getFullYear(), m:c.getMonth() });
    c = new Date(c.getFullYear(), c.getMonth()+1, 1);
  }
}

// ── ROW METRICS ─────────────────────────────────────────────────────────
const ROW_H_PHASE = 20;
const ROW_H_TASK  = 21;

// Precompute rows with phase breaks
const renderItems = []; // { type:'phase'|'task', ... }
let lastPhase = null;
const phaseExtents = {};
rows.forEach(r => {
  if (!phaseExtents[r.phase]) phaseExtents[r.phase] = { s:pd(r.start), e:pd(r.end) };
  else {
    if (pd(r.start)<phaseExtents[r.phase].s) phaseExtents[r.phase].s=pd(r.start);
    if (pd(r.end)  >phaseExtents[r.phase].e) phaseExtents[r.phase].e=pd(r.end);
  }
});

let rowNum = 0;
rows.forEach(r => {
  if (r.phase !== lastPhase) {
    lastPhase = r.phase;
    renderItems.push({ type:'phase', phase:r.phase, disc:r.disc });
  }
  rowNum++;
  renderItems.push({ type:'task', ...r, rowNum });
});

// Compute top offsets
let totalHeight = 0;
renderItems.forEach(it => {
  it.top = totalHeight;
  it.h   = it.type==='phase' ? ROW_H_PHASE : ROW_H_TASK;
  totalHeight += it.h;
});

// ── ZOOM STATE ──────────────────────────────────────────────────────────
let zoom = 1.0; // multiplier on canvas width
const ZOOM_MIN = 0.4, ZOOM_MAX = 8.0, ZOOM_STEP = 0.25;

// ── DOM REFS ────────────────────────────────────────────────────────────
const leftBody       = document.getElementById("left-body");
const rightPanel     = document.getElementById("right-panel");
const rightScroll    = document.getElementById("right-scroll");
const monthWrap      = document.getElementById("month-canvas-wrap");
const barsWrap       = document.getElementById("bars-canvas-wrap");
const rightHeader    = document.getElementById("right-header");

// ── BUILD LEFT PANEL (static) ────────────────────────────────────────────
{
  const container = document.createElement("div");
  renderItems.forEach(it => {
    const div = document.createElement("div");
    div.className = "lrow " + (it.type==='phase' ? 'ph' : '');
    div.style.height = it.h + "px";

    if (it.type === 'phase') {
      const c = color(it.disc);
      div.innerHTML = `<div class="l-color" style="background:${c} !important;flex-shrink:0;width:5px;height:100%"></div>
        <span class="ph-label" style="padding-left:8px">${it.phase}</span>`;
    } else {
      const c = color(it.disc);
      const dot = it.status==="Ongoing"
        ? `<span style="color:${c}">●</span>`
        : `<span style="color:#ccc">○</span>`;
      div.innerHTML = `
        <div class="l-color" style="background:${lighten(c,0.55)} !important;flex-shrink:0;width:5px;height:100%"></div>
        <div class="l-num">${it.rowNum}</div>
        <div class="l-name" title="${it.desc}">${it.desc}</div>
        <div class="l-resp">${it.resp}</div>
        <div class="l-days">${it.days}</div>
        <div class="l-pct" style="color:${it.pct>0?c:'#bbb'}">${it.pct}%</div>
        <div class="l-stat">${dot} ${it.status==="Ongoing"?"Ongoing":"Not Started"}</div>`;
    }
    container.appendChild(div);
  });
  leftBody.appendChild(container);
  leftBody.style.overflowY = "hidden";
}

// ── RENDER FUNCTION (called on zoom change) ───────────────────────────
function getCanvasWidth() {
  return Math.round(rightPanel.clientWidth * zoom);
}

function render() {
  const W = getCanvasWidth();

  // update month header
  monthWrap.style.width = W + "px";
  monthWrap.innerHTML = "";
  let prevY = null;
  months.forEach(mo => {
    const s = new Date(mo.y, mo.m, 1);
    const e = new Date(mo.y, mo.m+1, 1);
    const l = frac(s)*W;
    const r = frac(e)*W;
    const w = Math.max(0, Math.min(r,W) - Math.max(l,0));
    if (w < 1) return;
    const cell = document.createElement("div");
    cell.className = "month-cell" + (mo.m===0?" year-start":"");
    cell.style.left  = Math.max(0,l) + "px";
    cell.style.width = w + "px";
    const yrStr = (mo.m===0||prevY!==mo.y) ? `<span class="yr">${mo.y}</span>` : "";
    cell.innerHTML = yrStr + MO_IT[mo.m];
    monthWrap.appendChild(cell);
    prevY = mo.y;
  });

  // update bars canvas
  barsWrap.style.width  = W + "px";
  barsWrap.style.height = totalHeight + "px";
  barsWrap.innerHTML = "";

  // month grid lines (one shared set, behind everything)
  months.forEach(mo => {
    const mDate = new Date(mo.y, mo.m, 1);
    if (mDate <= PRJ_START) return;
    const x = frac(mDate)*W;
    const d = document.createElement("div");
    d.className = "g-line " + (mo.m===0 ? "g-year" : "g-month");
    d.style.cssText = `left:${x}px; top:0; height:${totalHeight}px;`;
    barsWrap.appendChild(d);
  });

  // today line
  if (TODAY >= PRJ_START && TODAY <= PRJ_END) {
    const x = frac(TODAY)*W;
    const t = document.createElement("div");
    t.className = "g-line g-today";
    t.style.cssText = `left:${x}px; top:0; height:${totalHeight}px;`;
    barsWrap.appendChild(t);
  }

  // rows
  renderItems.forEach(it => {
    const div = document.createElement("div");
    div.className = "brow " + (it.type==='phase'?'ph':'');
    div.style.cssText = `top:${it.top}px; height:${it.h}px;`;

    if (it.type === 'phase') {
      // alternating bg
      div.style.background = "#f0f0f0";
      // phase summary bar
      const ph = phaseExtents[it.phase];
      const c  = color(it.disc);
      const x1 = frac(ph.s)*W, x2 = frac(ph.e)*W;
      const bar = document.createElement("div");
      bar.className = "phase-bar";
      bar.style.cssText = `left:${x1}px; width:${Math.max(1,x2-x1)}px; background:${c} !important;`;
      div.appendChild(bar);
    } else {
      const c   = color(it.disc);
      const sD  = pd(it.start), eD = pd(it.end);
      const x1  = frac(sD)*W, x2 = frac(eD)*W;
      const bw  = Math.max(2, x2-x1);

      const wrap = document.createElement("div");
      wrap.className = "bar-wrap";
      wrap.style.cssText = `left:${x1}px; width:${bw}px;`;

      const bg = document.createElement("div");
      bg.className = "bar-bg";
      bg.style.cssText = `background:${lighten(c,0.35)} !important;`;
      wrap.appendChild(bg);

      if (it.pct > 0) {
        const prog = document.createElement("div");
        prog.className = "bar-prog";
        prog.style.cssText = `width:${it.pct}%; background:${c} !important;`;
        wrap.appendChild(prog);
      }

      // label only if zoom > 0.7 (avoid clutter when zoomed out)
      if (zoom > 0.5) {
        const lbl = document.createElement("div");
        lbl.className = "bar-lbl";
        lbl.innerHTML = `<span class="bl-code" style="color:${c}">${it.item}</span><span class="bl-pct"> ${it.pct}%</span><span class="bl-resp"> ${it.resp}</span>`;
        wrap.appendChild(lbl);
      }

      div.appendChild(wrap);
    }
    barsWrap.appendChild(div);
  });

  document.getElementById("zoom-label").textContent = Math.round(zoom*100) + "%";
}

// ── ZOOM CONTROLS ───────────────────────────────────────────────────────
function setZoom(z, pivotX) {
  // pivotX: pixel in right-panel coordinate to keep fixed
  const scrollBefore = rightScroll.scrollLeft;
  const oldW = getCanvasWidth();
  zoom = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, z));
  render();
  const newW = getCanvasWidth();
  // adjust scroll so the pivot stays in place
  if (pivotX !== undefined && oldW > 0) {
    const frac_ = (scrollBefore + pivotX) / oldW;
    rightScroll.scrollLeft = frac_ * newW - pivotX;
  } else {
    // keep same scroll ratio
    if (oldW > 0) rightScroll.scrollLeft = (scrollBefore / oldW) * newW;
  }
  // sync header scroll
  rightHeader.scrollLeft = rightScroll.scrollLeft;
}

document.getElementById("btn-zoom-in").addEventListener("click", () => setZoom(zoom + ZOOM_STEP));
document.getElementById("btn-zoom-out").addEventListener("click", () => setZoom(zoom - ZOOM_STEP));
document.getElementById("btn-fit").addEventListener("click", () => {
  zoom = 1.0;
  render();
  rightScroll.scrollLeft = 0;
  rightHeader.scrollLeft = 0;
});

// ── WHEEL ZOOM (Ctrl + scroll) ──────────────────────────────────────────
rightPanel.addEventListener("wheel", e => {
  if (e.ctrlKey || e.metaKey) {
    e.preventDefault();
    const rect = rightPanel.getBoundingClientRect();
    const pivotX = e.clientX - rect.left;
    const delta = e.deltaY > 0 ? -ZOOM_STEP : ZOOM_STEP;
    setZoom(zoom + delta, pivotX);
  }
}, { passive: false });

// ── PINCH ZOOM (touch) ──────────────────────────────────────────────────
let lastPinchDist = null;
rightPanel.addEventListener("touchstart", e => {
  if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    lastPinchDist = Math.sqrt(dx*dx+dy*dy);
  }
}, { passive: true });
rightPanel.addEventListener("touchmove", e => {
  if (e.touches.length === 2 && lastPinchDist) {
    e.preventDefault();
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx*dx+dy*dy);
    const delta = (dist - lastPinchDist) / 200;
    const midX = (e.touches[0].clientX + e.touches[1].clientX)/2 - rightPanel.getBoundingClientRect().left;
    setZoom(zoom + delta, midX);
    lastPinchDist = dist;
  }
}, { passive: false });
rightPanel.addEventListener("touchend", () => { lastPinchDist = null; });

// ── PAN (drag) ───────────────────────────────────────────────────────────
let isDragging = false, dragStartX = 0, dragStartScrollL = 0, dragStartScrollT = 0;

rightPanel.addEventListener("mousedown", e => {
  if (e.button !== 0) return;
  isDragging = true;
  dragStartX = e.clientX;
  dragStartScrollL = rightScroll.scrollLeft;
  dragStartScrollT = rightScroll.scrollTop;
  rightPanel.classList.add("grabbing");
});
window.addEventListener("mousemove", e => {
  if (!isDragging) return;
  const dx = e.clientX - dragStartX;
  rightScroll.scrollLeft = dragStartScrollL - dx;
  rightHeader.scrollLeft = rightScroll.scrollLeft;
  // sync left body vertical
  leftBody.scrollTop = rightScroll.scrollTop;
});
window.addEventListener("mouseup", () => {
  isDragging = false;
  rightPanel.classList.remove("grabbing");
});

// ── VERTICAL SCROLL SYNC ────────────────────────────────────────────────
rightScroll.addEventListener("scroll", () => {
  leftBody.scrollTop = rightScroll.scrollTop;
  rightHeader.scrollLeft = rightScroll.scrollLeft;
});
leftBody.addEventListener("scroll", () => {
  rightScroll.scrollTop = leftBody.scrollTop;
});

// ── KEYBOARD SHORTCUTS ──────────────────────────────────────────────────
window.addEventListener("keydown", e => {
  if (e.key === "=" || e.key === "+") setZoom(zoom + ZOOM_STEP);
  if (e.key === "-" || e.key === "_") setZoom(zoom - ZOOM_STEP);
  if (e.key === "0") { zoom=1; render(); }
});

// ── INITIAL RENDER ───────────────────────────────────────────────────────
// Make left-body and right-scroll the same overflow-y
leftBody.style.overflowY  = "scroll";
rightScroll.style.overflowY = "scroll";
rightScroll.style.overflowX = "scroll";
rightHeader.style.overflow  = "hidden";

// Set barsWrap min-height = panel height (filled when few rows)
function onResize() {
  render();
}
window.addEventListener("resize", onResize);
render();

// Scroll today into view on load (center it)
window.setTimeout(() => {
  const W = getCanvasWidth();
  const panelW = rightPanel.clientWidth;
  const todayX = frac(TODAY) * W;
  rightScroll.scrollLeft = Math.max(0, todayX - panelW * 0.35);
  rightHeader.scrollLeft = rightScroll.scrollLeft;
}, 50);
</script>
</body>
</html>
